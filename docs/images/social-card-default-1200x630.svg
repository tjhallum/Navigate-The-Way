<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Navigate The Way social share card</title>
  <desc id="desc">High-contrast social card with centered title and subtitle for link previews.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a4f9d"/>
      <stop offset="42%" stop-color="#122347"/>
      <stop offset="100%" stop-color="#0a1328"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Safe content zone (centered) -->
  <g transform="translate(600 315)" text-anchor="middle" filter="url(#soft)">
    <rect x="-170" y="-120" width="340" height="54" rx="14" fill="#13316b" stroke="#80a9ff" stroke-width="2"/>
    <text x="0" y="-84" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="1">NAVIGATE THE WAY</text>

    <text x="0" y="15" fill="#f4f7ff" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800">Navigate The Way ✝️</text>
    <text x="0" y="92" fill="#dce8ff" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="500">Scripture-centered Christian AI assistant</text>
  </g>
</svg>
